<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial Live Híbrido</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚽ Mundial Live</h1>
  <p>Datos combinados (API estable)</p>
</header>

<main>

  <section>
    <h2>🔴 En directo</h2>
    <div id="live" class="grid"></div>
  </section>

  <section>
    <h2>📅 Próximos partidos</h2>
    <div id="upcoming" class="grid"></div>
  </section>

  <section>
    <h2>🏁 Resultados</h2>
    <div id="results" class="grid"></div>
  </section>

</main>

<script>

//////////////////////////////
// 🔴 LIVE (TheSportsDB)
//////////////////////////////
async function loadLive() {
  const box = document.getElementById("live");

  try {
    const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/livescore.php?s=Soccer");
    const data = await res.json();

    box.innerHTML = "";

    if (!data.events) {
      box.innerHTML = "<p>No hay partidos en directo.</p>";
      return;
    }

    data.events.slice(0, 5).forEach(m => {
      const card = document.createElement("div");
      card.className = "card live";

      card.innerHTML = `
        <div class="teams">
          <span>${m.strHomeTeam}</span>
          <strong>${m.intHomeScore ?? 0} - ${m.intAwayScore ?? 0}</strong>
          <span>${m.strAwayTeam}</span>
        </div>
      `;

      box.appendChild(card);
    });

  } catch (e) {
    box.innerHTML = "<p>Error cargando directo</p>";
  }
}

//////////////////////////////
// 📅 UPCOMING (TheSportsDB)
//////////////////////////////
async function loadUpcoming() {
  const box = document.getElementById("upcoming");

  try {
    const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328");
    const data = await res.json();

    box.innerHTML = "";

    if (!data.events) {
      box.innerHTML = "<p>No hay próximos partidos.</p>";
      return;
    }

    data.events.slice(0, 8).forEach(m => {
      const card = document.createElement("div");
      card.className = "card future";

      card.innerHTML = `
        <div class="teams">
          <span>${m.strHomeTeam}</span>
          <strong>VS</strong>
          <span>${m.strAwayTeam}</span>
        </div>
        <div class="status">📅 ${m.dateEvent}</div>
      `;

      box.appendChild(card);
    });

  } catch (e) {
    box.innerHTML = "<p>Error cargando próximos partidos</p>";
  }
}

//////////////////////////////
// 🏁 RESULTS (OpenLigaDB fallback)
//////////////////////////////
async function loadResults() {
  const box = document.getElementById("results");

  try {
    const res = await fetch("https://api.openligadb.de/getmatchdata/bl1/2024");
    const data = await res.json();

    box.innerHTML = "";

    data.slice(0, 10).forEach(m => {
      const home = m.team1.teamName;
      const away = m.team2.teamName;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="teams">
          <span>${home}</span>
          <strong>${m.matchResults?.[0]?.pointsTeam1 ?? 0} - ${m.matchResults?.[0]?.pointsTeam2 ?? 0}</strong>
          <span>${away}</span>
        </div>
        <div class="status">🏁 Finalizado</div>
      `;

      box.appendChild(card);
    });

  } catch (e) {
    box.innerHTML = "<p>Error cargando resultados</p>";
  }
}

loadLive();
loadUpcoming();
loadResults();

setInterval(loadLive, 60000);

</script>

</body>
</html>
