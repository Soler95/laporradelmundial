<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial Live Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚽ Mundial Live Pro</h1>
  <p>Resultados oficiales API-Football</p>
</header>

<main>

  <section>
    <h2>🔴 En directo</h2>
    <div id="live" class="grid"></div>
  </section>

  <section>
    <h2>📅 Próximos partidos</h2>
    <div id="upcoming" class="grid"></div>
  </section>

  <section>
    <h2>🏁 Resultados del Mundial</h2>
    <div id="results" class="grid"></div>
  </section>

</main>

<script>

const API_KEY = "4e528f6cc710f75b4721e1b45cb145d8";

// ================= LIVE =================
async function loadLive() {
  const box = document.getElementById("live");

  try {
    const res = await fetch("https://v3.football.api-sports.io/fixtures?live=all", {
      headers: { "x-apisports-key": API_KEY }
    });

    const data = await res.json();

    box.innerHTML = "";

    if (!data.response.length) {
      box.innerHTML = "<p>No hay partidos en directo ahora mismo.</p>";
      return;
    }

    data.response.forEach(m => {
      const card = document.createElement("div");
      card.className = "card live";

      card.innerHTML = `
        <div class="teams">
          <span>${m.teams.home.name}</span>
          <strong>${m.goals.home ?? 0} - ${m.goals.away ?? 0}</strong>
          <span>${m.teams.away.name}</span>
        </div>
        <div class="status">🔴 ${m.fixture.status.long}</div>
      `;

      box.appendChild(card);
    });

  } catch (e) {
    box.innerHTML = "<p>Error cargando partidos en directo</p>";
  }
}

// ================= UPCOMING =================
async function loadUpcoming() {
  const box = document.getElementById("upcoming");

  try {
    const res = await fetch("https://v3.football.api-sports.io/fixtures?league=1&season=2026&next=10", {
      headers: { "x-apisports-key": API_KEY }
    });

    const data = await res.json();

    box.innerHTML = "";

    if (!data.response.length) {
      box.innerHTML = "<p>No hay próximos partidos.</p>";
      return;
    }

    data.response.forEach(m => {
      const date = new Date(m.fixture.date).toLocaleString("es-ES");

      const card = document.createElement("div");
      card.className = "card future";

      card.innerHTML = `
        <div class="teams">
          <span>${m.teams.home.name}</span>
          <strong>VS</strong>
          <span>${m.teams.away.name}</span>
        </div>
        <div class="status">📅 ${date}</div>
      `;

      box.appendChild(card);
    });

  } catch (e) {
    box.innerHTML = "<p>Error cargando próximos partidos</p>";
  }
}

// ================= RESULTS =================
async function loadResults() {
  const box = document.getElementById("results");

  try {
    const res = await fetch("https://v3.football.api-sports.io/fixtures?league=1&season=2026&status=ft", {
      headers: { "x-apisports-key": API_KEY }
    });

    const data = await res.json();

    box.innerHTML = "";

    if (!data.response.length) {
      box.innerHTML = "<p>No hay resultados aún.</p>";
      return;
    }

    data.response.slice(0, 10).forEach(m => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="teams">
          <span>${m.teams.home.name}</span>
          <strong>${m.goals.home} - ${m.goals.away}</strong>
          <span>${m.teams.away.name}</span>
        </div>
        <div class="status">🏁 Finalizado</div>
      `;

      box.appendChild(card);
    });

  } catch (e) {
    box.innerHTML = "<p>Error cargando resultados</p>";
  }
}

// ================= INIT =================
loadLive();
loadUpcoming();
loadResults();

setInterval(loadLive, 60000);

</script>

</body>
</html>
