<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a1628;color:#e8edf5;min-height:100vh}
header{background:#0e2040;border-bottom:2px solid #c9a227;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.15rem;font-weight:700;color:#fff}
header p{font-size:.72rem;color:#8faabf;margin-top:2px}
#sync{font-size:.65rem;color:#4a6a8a;margin-top:2px}
nav{display:flex;background:#0e2040;border-bottom:1px solid #1e3a5a}
nav button{flex:1;padding:.7rem .5rem;background:none;border:none;color:#6a8faa;font-size:.82rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
nav button.active{color:#c9a227;border-bottom-color:#c9a227}
.page{display:none;padding:.75rem}
.page.active{display:block}
.slabel{font-size:.62rem;font-weight:700;letter-spacing:.1em;color:#8faabf;text-transform:uppercase;margin:1rem 0 .35rem;padding-left:2px}
.slabel:first-child{margin-top:0}
.match{background:#0e2040;border:1px solid #1e3a5a;border-radius:7px;padding:.55rem .75rem;margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
.match.live{border-color:#c9a227;background:#111e38}
.m-status{font-size:.6rem;font-weight:700;min-width:46px;text-align:center;line-height:1.3}
.s-live{color:#f5c518}
.s-done{color:#4caf50}
.s-soon{color:#4a6a8a}
.m-teams{flex:1;display:flex;align-items:center;gap:.35rem;justify-content:center}
.m-team{font-size:.78rem;font-weight:500;min-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-team.right{text-align:right}
.m-score{display:flex;align-items:center;gap:3px;flex-shrink:0}
.sc{background:#152d4a;border:1px solid #1e3a5a;border-radius:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;transition:.3s}
.sc.updated{background:#1a3a1a;border-color:#4caf50}
.sep{font-size:.65rem;color:#3a5a7a}
.m-info{font-size:.58rem;color:#3a5a7a;white-space:nowrap;min-width:30px;text-align:right}
.group-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.group-block{background:#0e2040;border:1px solid #1e3a5a;border-radius:7px;overflow:hidden}
.group-block.esp{border-color:#c9a227}
.gh{background:#152d4a;padding:.45rem .75rem;font-size:.7rem;font-weight:700;color:#c9a227;letter-spacing:.05em}
.group-block.esp .gh{background:#1a3a0a}
.gt{display:flex;align-items:center;gap:.4rem;padding:.38rem .75rem;border-top:1px solid #1e3a5a;font-size:.75rem}
.gt:first-of-type{border-top:none}
.gf{font-size:.9rem}
.gn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.7rem}
.gpts{font-weight:700;color:#c9a227;min-width:18px;text-align:right;font-size:.72rem}
.gst{font-size:.58rem;color:#3a5a7a;min-width:60px;text-align:right}
table.rank{width:100%;border-collapse:collapse;font-size:.82rem}
table.rank th{font-size:.6rem;font-weight:600;color:#6a8faa;text-transform:uppercase;letter-spacing:.06em;padding:.4rem .5rem;text-align:left;border-bottom:1px solid #1e3a5a}
table.rank td{padding:.42rem .5rem;border-bottom:1px solid #0e2040}
table.rank tr:hover td{background:#0e2040}
.rpos{font-weight:700;color:#c9a227;width:26px}
.rpos.top{color:#f5c518}
.rnm{font-weight:500}
.rpt{font-weight:700;text-align:right}
.rac{color:#6a8faa;text-align:center}
.note{font-size:.7rem;color:#4a6a8a;margin-top:.75rem;padding:.6rem .75rem;background:#0e2040;border-radius:6px;border-left:3px solid #1e3a5a;line-height:1.5}
.chip{display:inline-block;background:#152d4a;border:1px solid #1e3a5a;border-radius:4px;padding:2px 6px;font-size:.6rem;color:#8faabf;margin-left:4px;vertical-align:middle}

  btn.classList.add('active');
}

  const s=[...players].sort((a,b)=>b.pts-a.pts||b.aciertos-a.aciertos);

// ── RENDER PARTIDOS ───────────────────────────────────
function renderMatches(liveData){
  let html='';
  let curG='';
  matches.forEach((m,i)=>{
    if(m.g!==curG){
      const label=m.g==='H'?'Grupo H — Espana &#11088;':'Grupo '+m.g;
      html+=`<div class="slabel">${label}</div>`;
      curG=m.g;
    }
    const live=liveData&&liveData[i];
    let statusClass='s-soon', statusTxt=`${m.d}<br>${m.h}`, isLive=false;
    let ls='&#183;', vs='&#183;', scClass='';
    if(live){
      if(live.status==='in'){
        statusClass='s-live';statusTxt=`EN VIVO<br>${live.clock||''}`;isLive=true;
        ls=live.homeScore;vs=live.awayScore;scClass=' updated';
      } else if(live.status==='post'){
        statusClass='s-done';statusTxt='FIN';
        ls=live.homeScore;vs=live.awayScore;scClass=' updated';
      }
    }
    html+=`<div class="match${isLive?' live':''}" id="m${i}">
      <span class="m-status ${statusClass}">${statusTxt}</span>
      <div class="m-teams">
        <span class="m-team right">${m.lf} ${m.local}</span>
        <div class="m-score">
          <span class="sc${scClass}">${ls}</span>
          <span class="sep">-</span>
          <span class="sc${scClass}">${vs}</span>
        </div>
        <span class="m-team">${m.vf} ${m.vis}</span>
      </div>
      <span class="m-info">${m.stadium}</span>
    </div>`;
  });
  document.getElementById('partidos').innerHTML=html;
}
renderMatches(null);

// ── ESPN API AUTO-UPDATE ──────────────────────────────
const ESPN_URL='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';

function normalizeName(n){
  return n.toLowerCase()
    .replace(/\./g,'').replace(/-/g,' ')
    .replace(/united states/,'usa')
    .replace(/united states of america/,'usa')
    .replace(/ivory coast/,'c. de marfil')
    .replace(/côte d'ivoire/,'c. de marfil')
    .replace(/netherlands/,'paises bajos')
    .replace(/türkiye/,'turquia').replace(/turkey/,'turquia')
    .replace(/south korea/,'corea del sur')
    .replace(/dr congo/,'rd congo').replace(/democratic republic of congo/,'rd congo')
    .replace(/czech republic/,'rep. checa')
    .replace(/cape verde/,'cabo verde')
    .replace(/saudi arabia/,'arabia saudi')
    .replace(/new zealand/,'nueva zelanda')
    .replace(/[áàâä]/g,'a').replace(/[éèêë]/g,'e')
    .replace(/[íìîï]/g,'i').replace(/[óòôö]/g,'o')
    .replace(/[úùûü]/g,'u').trim();
}

async function fetchScores(){
  try{
    const r=await fetch(ESPN_URL,{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const events=d.events||[];
    const liveMap={};
    events.forEach(ev=>{
      const comp=ev.competitions&&ev.competitions[0];
      if(!comp)return;
      const st=comp.status&&comp.status.type&&comp.status.type.name;
      const comps=comp.competitors||[];
      const home=comps.find(c=>c.homeAway==='home');
      const away=comps.find(c=>c.homeAway==='away');
      if(!home||!away)return;
      const hn=normalizeName(home.team.displayName||'');
      const an=normalizeName(away.team.displayName||'');
      const status=st==='STATUS_FINAL'?'post':st==='STATUS_IN_PROGRESS'?'in':'pre';
      const clock=comp.status&&comp.status.displayClock;
      liveMap[hn+'|'+an]={status,homeScore:home.score||'0',awayScore:away.score||'0',clock};
    });
    // Map back to our matches array
    const liveData=matches.map(m=>{
      const hn=normalizeName(m.espnTeams[0]);
      const an=normalizeName(m.espnTeams[1]);
      return liveMap[hn+'|'+an]||liveMap[an+'|'+hn]||null;
    });
    renderMatches(liveData);
    const now=new Date();
    document.getElementById('sync').textContent='Actualizado: '+now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  } catch(e){
    document.getElementById('sync').textContent='Sin conexion con API — datos estaticos';
  }
}

fetchScores();
setInterval(fetchScores,60000);
